# Extra modbus settings for SBR Batteries - Gives per module cell information
# Manually add the items below to the list of sensors in modbus_sungrow.yaml
# Add the following to secrets.yaml -> sungrow_modbus_slave_battery: 200

# Tested on Sungrow SHxRT with SBR - SAPPHIRE-H_B001.V000.P019 - SBRBCU-S_22011.01.27
# ONLY WORKS ON INTERNAL TCP/MODBUS PORT! NOT WINET DONGLE!

        

      #####################
      # Start custom SBR battery
      #####################


      - name: Battery 1 Voltage
        unique_id: sg_battery_1_voltage
        device_address: !secret sungrow_modbus_slave_battery
        address: 10740 # reg 10741;Bat Spannung 0.1 V; 2010
        input_type: input
        data_type: uint16
        scale: 0.1
        precision: 1
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        scan_interval: *scan_interval_medium

      - name: Battery 1 Current
        unique_id: sg_battery_1_current
        device_address: !secret sungrow_modbus_slave_battery
        address: 10741 # reg 10742;Bat Strom 0.1 A; 1
        input_type: input
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        scan_interval: *scan_interval_medium

      - name: Battery 1 Temperature
        unique_id: sg_battery_1_temperature
        device_address: !secret sungrow_modbus_slave_battery
